services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./app:/app/app:ro
    environment:
      - DATABASE_URL=postgresql://petapp:petapp@db:5432/petapp
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app:ro
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: petapp
      POSTGRES_PASSWORD: petapp
      POSTGRES_DB: petapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U petapp" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
